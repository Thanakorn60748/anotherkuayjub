<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>กวยจั๊บ · อูบล</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #f5efe8; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
    
    /* === Customer View === */
    .card { max-width: 500px; width: 100%; background: #fefcf9; border-radius: 48px; box-shadow: 0 24px 48px rgba(60,40,28,0.10); padding: 28px 22px 32px; border: 1px solid #eaded2; }
    .brand { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .brand h1 { font-size: 2.2rem; font-weight: 600; color: #2d1f14; display: flex; align-items: baseline; gap: 6px; }
    .brand h1 small { font-size: 0.9rem; font-weight: 400; background: #e8d7ca; padding: 0 14px; border-radius: 40px; color: #4f3727; }
    .brand i { font-size: 2.2rem; color: #b08364; }
    .subhead { color: #6f5644; font-size: 0.95rem; border-left: 4px solid #cfb29b; padding-left: 14px; margin: 6px 0 20px 0; background: #f8f1ea; border-radius: 0 40px 40px 0; padding: 8px 14px; display: inline-block; }
    .size-selector { display: flex; gap: 12px; margin: 18px 0 22px; flex-wrap: wrap; }
    .size-btn { flex: 1; min-width: 76px; background: #f3ebe4; border: 2px solid transparent; border-radius: 60px; padding: 12px 6px; text-align: center; font-weight: 600; font-size: 1.0rem; color: #3d2c1e; cursor: pointer; transition: 0.15s; }
    .size-btn i { display: block; font-size: 1.4rem; margin-bottom: 4px; color: #b3927c; }
    .size-btn span { display: block; font-weight: 400; font-size: 0.7rem; color: #7a6454; margin-top: 2px; }
    .size-btn.active { background: #ffffff; border-color: #b87c5a; box-shadow: 0 6px 14px rgba(184,124,90,0.18); }
    .size-btn.active i { color: #b87c5a; }
    
    /* === Noodle Section - Only 2 options === */
    .noodle-section { margin: 18px 0 20px; }
    .noodle-section label { font-weight: 500; color: #3d2c1e; display: block; margin-bottom: 8px; font-size: 0.95rem; }
    .noodle-grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .noodle-opt { 
      flex: 1; 
      min-width: 120px;
      background: #f3ebe4; 
      border-radius: 60px; 
      padding: 14px 20px; 
      font-size: 1rem; 
      font-weight: 600; 
      color: #2d1f14; 
      cursor: pointer; 
      border: 2px solid transparent; 
      transition: 0.15s; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 10px; 
      text-align: center;
    }
    .noodle-opt i { color: #a4836a; font-size: 1.2rem; }
    .noodle-opt.active { 
      background: #ffffff; 
      border-color: #b87c5a; 
      box-shadow: 0 4px 12px rgba(184,124,90,0.15); 
    }
    .noodle-opt.active i { color: #b87c5a; }
    
    .qty-row { display: flex; align-items: center; gap: 12px; background: #f3ebe4; padding: 6px 12px 6px 20px; border-radius: 60px; margin: 18px 0 24px; }
    .qty-row label { font-weight: 500; color: #3d2c1e; flex: 1; }
    .qty-control { display: flex; align-items: center; gap: 12px; }
    .qty-control button { width: 36px; height: 36px; border-radius: 40px; border: none; background: white; font-size: 1.4rem; font-weight: 300; color: #3d2c1e; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.04); transition: 0.1s; display: flex; align-items: center; justify-content: center; }
    .qty-control button:active { background: #dfd0c4; }
    .qty-control span { font-size: 1.5rem; font-weight: 600; min-width: 32px; text-align: center; color: #2d1f14; }
    .order-btn { width: 100%; background: #b87c5a; border: none; border-radius: 60px; padding: 18px 12px; font-size: 1.25rem; font-weight: 600; color: white; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.15s; box-shadow: 0 10px 20px rgba(184,124,90,0.28); margin-top: 6px; }
    .order-btn:active { transform: scale(0.97); background: #9e6b4d; }
    
    /* === BIG TOAST MESSAGE === */
    .toast-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }
    .toast-overlay.show { display: flex; }
    
    .toast-box {
      background: #fefcf9;
      border-radius: 60px;
      padding: 50px 60px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.3);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid #b87c5a;
    }
    .toast-box i { 
      font-size: 4.5rem; 
      color: #2b7a5a; 
      display: block; 
      margin-bottom: 16px; 
    }
    .toast-box .big-text { 
      font-size: 2.5rem; 
      font-weight: 700; 
      color: #2d1f14; 
      margin-bottom: 8px; 
    }
    .toast-box .sub-text { 
      font-size: 1.3rem; 
      color: #6f5644; 
      font-weight: 500; 
    }
    .toast-box .order-detail {
      font-size: 1.1rem;
      color: #7a6454;
      margin-top: 10px;
      padding: 10px 20px;
      background: #f5ede7;
      border-radius: 40px;
      display: inline-block;
    }
    .toast-close-btn {
      margin-top: 24px;
      background: #b87c5a;
      border: none;
      border-radius: 60px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }
    .toast-close-btn:active { transform: scale(0.95); background: #9e6b4d; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .footer-note { margin-top: 16px; font-size: 0.65rem; color: #b8a494; text-align: center; }
    
    /* === Admin View === */
    .admin-panel { display: none; max-width: 700px; width: 100%; background: #fcf8f4; border-radius: 40px; padding: 30px 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border: 1px solid #4a3728; }
    .admin-panel.active { display: block; }
    .customer-view { display: block; }
    .customer-view.hidden { display: none; }
    
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 3px solid #b87c5a; padding-bottom: 16px; }
    .admin-header h1 { font-size: 1.8rem; color: #2d1f14; display: flex; align-items: center; gap: 12px; }
    .admin-header h1 i { color: #b87c5a; }
    .admin-header .badge-count { background: #b87c5a; color: white; border-radius: 40px; padding: 4px 16px; font-size: 0.9rem; font-weight: 600; }
    .stats { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-box { background: white; border-radius: 20px; padding: 12px 20px; flex: 1; min-width: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #e8ddd2; }
    .stat-box .label { font-size: 0.7rem; text-transform: uppercase; color: #8a7564; letter-spacing: 0.5px; }
    .stat-box .value { font-size: 1.6rem; font-weight: 700; color: #2d1f14; }
    .order-list { background: white; border-radius: 24px; padding: 8px 4px; max-height: 500px; overflow-y: auto; border: 1px solid #e8ddd2; }
    .order-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid #f0e8e0; }
    .order-item:last-child { border-bottom: none; }
    .order-item .info { display: flex; flex-direction: column; gap: 2px; }
    .order-item .info .main { font-weight: 600; color: #2d1f14; font-size: 1.05rem; }
    .order-item .info .sub { font-size: 0.8rem; color: #7a6454; display: flex; gap: 10px; flex-wrap: wrap; }
    .order-item .info .sub .tag { background: #f0e8e0; border-radius: 40px; padding: 0 12px; font-size: 0.7rem; font-weight: 500; }
    .order-item .time { font-size: 0.75rem; color: #a69080; }
    .empty-msg { text-align: center; padding: 40px 0; color: #a69080; font-style: italic; }
    .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .btn { background: #f0e8e0; border: none; border-radius: 60px; padding: 10px 24px; font-weight: 500; color: #2d1f14; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.1s; font-size: 0.9rem; }
    .btn:active { transform: scale(0.96); }
    .btn-danger { background: #d4b8a8; color: #3d241a; }
    .btn-primary { background: #b87c5a; color: white; }
    .refresh-note { margin-top: 16px; font-size: 0.7rem; color: #8a7564; text-align: center; }
    .admin-back-btn { margin-top: 20px; text-align: center; }
    .admin-back-btn .btn { background: #e8ddd2; }
    .admin-hint { position: fixed; bottom: 10px; right: 10px; font-size: 0.5rem; color: rgba(0,0,0,0.08); pointer-events: none; user-select: none; }
    
    @media (max-width: 480px) { 
      .card { padding: 20px 14px; } 
      .size-btn { min-width: 68px; font-size: 0.9rem; }
      .admin-panel { padding: 20px 16px; }
      .admin-header h1 { font-size: 1.4rem; }
      .toast-box { padding: 30px 24px; }
      .toast-box .big-text { font-size: 1.8rem; }
      .toast-box .sub-text { font-size: 1rem; }
      .toast-box i { font-size: 3.5rem; }
      .noodle-opt { min-width: 100px; padding: 12px 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<!-- ===== CUSTOMER VIEW ===== -->
<div id="customerView" class="customer-view">
  <div class="card">
    <div class="brand">
      <h1>กวยจั๊บ <small>อูบล</small></h1>
      <i class="fas fa-utensils"></i>
    </div>
    <div class="subhead"><i class="fas fa-store" style="margin-right: 8px; color:#b3927c;"></i> เส้นสด · 3 ขนาด · สั่งเลย</div>

    <div class="size-selector" id="sizeSelector">
      <div class="size-btn" data-size="เล็ก" data-price="45"><i class="fas fa-coffee"></i> เล็ก <span>45 ฿</span></div>
      <div class="size-btn active" data-size="กลาง" data-price="55"><i class="fas fa-mug-hot"></i> กลาง <span>55 ฿</span></div>
      <div class="size-btn" data-size="ใหญ่" data-price="65"><i class="fas fa-wine-bottle"></i> ใหญ่ <span>65 ฿</span></div>
    </div>

    <!-- === Only 2 Noodle Options === -->
    <div class="noodle-section">
      <label><i class="fas fa-seedling" style="margin-right: 8px; color:#a4836a;"></i>เลือกเส้น</label>
      <div class="noodle-grid" id="noodleGrid">
        <div class="noodle-opt active" data-noodle="เส้นปกติ"><i class="fas fa-utensils"></i> เส้นปกติ</div>
        <div class="noodle-opt" data-noodle="เส้นบุก"><i class="fas fa-leaf"></i> เส้นบุก</div>
      </div>
    </div>

    <div class="qty-row">
      <label><i class="fas fa-hashtag" style="margin-right: 8px; color:#b3927c;"></i>จำนวน</label>
      <div class="qty-control">
        <button id="qtyDec">−</button>
        <span id="qtyDisplay">1</span>
        <button id="qtyInc">+</button>
      </div>
    </div>

    <button class="order-btn" id="orderBtn"><i class="fas fa-bowl-food"></i> สั่งเลย</button>

    <div class="footer-note"><i class="fas fa-qrcode"></i> สแกนสั่ง · ออเดอร์เก็บในเครื่องคุณ</div>
  </div>
</div>

<!-- ===== BIG TOAST OVERLAY ===== -->
<div id="toastOverlay" class="toast-overlay">
  <div class="toast-box">
    <i class="fas fa-check-circle"></i>
    <div class="big-text">✅ สั่งแล้ว!</div>
    <div class="sub-text">ขอบคุณที่สั่งอาหารค่ะ</div>
    <div class="order-detail" id="orderDetail">กลาง · เส้นปกติ x1</div>
    <button class="toast-close-btn" id="toastCloseBtn">ตกลง</button>
  </div>
</div>

<!-- ===== ADMIN VIEW ===== -->
<div id="adminPanel" class="admin-panel">
  <div class="admin-header">
    <h1><i class="fas fa-user-shield"></i> ออเดอร์ <span style="font-size:0.8rem; color:#7a6454; font-weight:400;">(เฉพาะคุณ)</span></h1>
    <span class="badge-count" id="orderCount">0</span>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="label">ออเดอร์ทั้งหมด</div><div class="value" id="totalOrders">0</div></div>
    <div class="stat-box"><div class="label">ลูกค้าสั่ง</div><div class="value" id="totalItems">0</div></div>
  </div>

  <div class="order-list" id="orderList">
    <div class="empty-msg"><i class="fas fa-inbox"></i> ยังไม่มีออเดอร์</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="refreshBtn"><i class="fas fa-rotate"></i> รีเฟรช</button>
    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash-can"></i> ล้างทั้งหมด</button>
  </div>
  <div class="refresh-note"><i class="fas fa-sync-alt fa-fw"></i> ออเดอร์อัปเดตอัตโนมัติทุก 5 วินาที</div>
  
  <div class="admin-back-btn">
    <button class="btn" id="backToCustomer"><i class="fas fa-arrow-left"></i> กลับไปหน้าร้าน</button>
  </div>
</div>

<!-- Secret hint -->
<div class="admin-hint">🔑 #admin</div>

<script>
  (function() {
    // === STATE ===
    let selectedSize = 'กลาง', selectedPrice = 55, selectedNoodle = 'เส้นปกติ', quantity = 1;
    let adminInterval = null;

    // === DOM REFS ===
    const customerView = document.getElementById('customerView');
    const adminPanel = document.getElementById('adminPanel');
    const sizeBtns = document.querySelectorAll('.size-btn');
    const noodleOpts = document.querySelectorAll('.noodle-opt');
    const qtyDisplay = document.getElementById('qtyDisplay');
    const qtyDec = document.getElementById('qtyDec');
    const qtyInc = document.getElementById('qtyInc');
    const orderBtn = document.getElementById('orderBtn');
    const toastOverlay = document.getElementById('toastOverlay');
    const toastCloseBtn = document.getElementById('toastCloseBtn');
    const orderDetail = document.getElementById('orderDetail');
    const orderList = document.getElementById('orderList');
    const totalOrdersEl = document.getElementById('totalOrders');
    const totalItemsEl = document.getElementById('totalItems');
    const orderCountBadge = document.getElementById('orderCount');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearBtn = document.getElementById('clearBtn');
    const backBtn = document.getElementById('backToCustomer');

    // === CUSTOMER FUNCTIONS ===
    function getOrders() {
      try { return JSON.parse(localStorage.getItem('kuayjub_orders')) || []; } catch { return []; }
    }
    function saveOrders(orders) { localStorage.setItem('kuayjub_orders', JSON.stringify(orders)); }

    sizeBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        sizeBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        selectedSize = this.dataset.size;
        selectedPrice = parseInt(this.dataset.price, 10);
      });
    });

    noodleOpts.forEach(opt => {
      opt.addEventListener('click', function() {
        noodleOpts.forEach(o => o.classList.remove('active'));
        this.classList.add('active');
        selectedNoodle = this.dataset.noodle;
      });
    });

    function updateQtyDisplay() { qtyDisplay.innerText = quantity; }
    qtyDec.addEventListener('click', function() { if (quantity > 1) { quantity--; updateQtyDisplay(); } });
    qtyInc.addEventListener('click', function() { if (quantity < 99) { quantity++; updateQtyDisplay(); } });

    // === SHOW BIG TOAST ===
    function showBigToast(size, noodle, qty) {
      orderDetail.textContent = `${size} · ${noodle} x${qty}`;
      toastOverlay.classList.add('show');
      // Auto close after 4 seconds
      setTimeout(() => {
        toastOverlay.classList.remove('show');
      }, 4000);
    }

    toastCloseBtn.addEventListener('click', function() {
      toastOverlay.classList.remove('show');
    });

    // Close toast when clicking outside the box
    toastOverlay.addEventListener('click', function(e) {
      if (e.target === toastOverlay) {
        toastOverlay.classList.remove('show');
      }
    });

    orderBtn.addEventListener('click', function() {
      const order = {
        size: selectedSize,
        price: selectedPrice,
        noodle: selectedNoodle,
        qty: quantity,
        timestamp: Date.now()
      };
      const orders = getOrders();
      orders.push(order);
      saveOrders(orders);
      
      // Show BIG toast
      showBigToast(selectedSize, selectedNoodle, quantity);
      
      // If admin is visible, refresh it
      if (adminPanel.classList.contains('active')) {
        renderAdminOrders();
      }
    });

    // === ADMIN FUNCTIONS ===
    function renderAdminOrders() {
      const orders = getOrders();
      const total = orders.length;
      const totalItems = orders.reduce((sum, o) => sum + (o.qty || 1), 0);

      totalOrdersEl.textContent = total;
      totalItemsEl.textContent = totalItems;
      orderCountBadge.textContent = total;

      orderList.innerHTML = '';
      if (total === 0) {
        orderList.innerHTML = `<div class="empty-msg"><i class="fas fa-inbox"></i> ยังไม่มีออเดอร์</div>`;
        return;
      }

      const reversed = [...orders].reverse();
      reversed.forEach((ord) => {
        const div = document.createElement('div');
        div.className = 'order-item';
        const size = ord.size || 'กลาง';
        const noodle = ord.noodle || 'เส้นปกติ';
        const qty = ord.qty || 1;
        const price = ord.price || 55;
        const totalPrice = qty * price;
        const time = new Date(ord.timestamp || Date.now());
        const timeStr = time.toLocaleString('th-TH', { 
          hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric'
        });

        div.innerHTML = `
          <div class="info">
            <div class="main">${size} · ${noodle} <span style="font-weight:400; font-size:0.85rem; color:#7a6454;">x${qty}</span></div>
            <div class="sub">
              <span>💰 ${totalPrice} ฿</span>
              <span class="tag">${size}</span>
              <span class="tag">${noodle}</span>
            </div>
          </div>
          <div class="time"><i class="far fa-clock"></i> ${timeStr}</div>
        `;
        orderList.appendChild(div);
      });
    }

    function clearAllOrders() {
      if (confirm('⚠️ ล้างออเดอร์ทั้งหมดใช่ไหม?')) {
        saveOrders([]);
        renderAdminOrders();
      }
    }

    // === VIEW SWITCHING ===
    function showCustomerView() {
      customerView.classList.remove('hidden');
      adminPanel.classList.remove('active');
      if (adminInterval) {
        clearInterval(adminInterval);
        adminInterval = null;
      }
      if (window.location.hash === '#admin') {
        history.pushState(null, null, ' ');
      }
    }

    function showAdminView() {
      customerView.classList.add('hidden');
      adminPanel.classList.add('active');
      renderAdminOrders();
      if (!adminInterval) {
        adminInterval = setInterval(renderAdminOrders, 5000);
      }
      if (window.location.hash !== '#admin') {
        history.pushState(null, null, '#admin');
      }
    }

    function checkHash() {
      if (window.location.hash === '#admin') {
        showAdminView();
      } else {
        showCustomerView();
      }
    }

    // === EVENT LISTENERS ===
    refreshBtn.addEventListener('click', renderAdminOrders);
    clearBtn.addEventListener('click', clearAllOrders);
    backBtn.addEventListener('click', showCustomerView);

    window.addEventListener('hashchange', function() {
      if (window.location.hash === '#admin') {
        showAdminView();
      } else {
        showCustomerView();
      }
    });

    // === INIT ===
    updateQtyDisplay();
    checkHash();

    console.log('🍜 กวยจั๊บ อูบล พร้อมสั่ง!');
    console.log('🔑 Admin: เพิ่ม #admin ต่อท้าย URL');
  })();
</script>
</body>
</html>
